name: cloop
description: Cloop Business Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^0.65.0
  shared_preferences: ^2.2.2
  flutter_colorpicker: ^1.1.0
  file_picker: ^8.0.0+1
  http: ^1.2.2
  flutter_quill: 11.5.0
  flutter_html: ^3.0.0-beta.2
  url_launcher: ^6.2.4
  flutter_local_notifications: ^17.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/static/Inter_18pt-Regular.ttf
        - asset: assets/fonts/static/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/static/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/static/Inter_18pt-SemiBold.ttf
          weight: 600
